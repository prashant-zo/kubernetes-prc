apiVersion: v1
kind: Pod
metadata:
  name: production-app
  namespace: dev
  labels:
    app: production-app
    version: "1.0"
    env: dev
  annotations:
    maintainer: "prashantkd010@gmail.com"
    description: "production-grade pod example"
spec:
  restartPolicy: Always

  initContainers:
    - name: init-check
      image: busybox:1.35
      command: ['sh', '-c', 'echo Init complete; sleep 2']

  containers:
    - name: app
      image: nginx:alpine
      ports:
        - containerPort: 80
          protocol: TCP

      env:
        - name: APP_ENV
          value: "dev"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name

      resources:
        requests:
          memory: "64Mi"
          cpu: "100m"
        limits:
          memory: "128Mi"
          cpu: "200m"

      startupProbe:
        httpGet:
          path: /
          port: 80
        failureThreshold: 15
        periodSeconds: 2

      livenessProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 5
        periodSeconds: 10
        failureThreshold: 3

      readinessProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 3
        periodSeconds: 5
        failureThreshold: 2
