apiVersion: v1
kind: Pod
metadata:
  name: env-demo
spec:
  containers:
    - name: app
      image: nginx:alpine
      env:
        - name: APP_ENV
          value: production

        - name: MY_POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name

        - name: MY_POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP

        - name: MY_NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
