apiVersion: v1
kind: ConfigMap
metadata:
  name: webapp-config-v1
data:
  APP_ENV: "production"
  APP_PORT: "8080"
  LOG_LEVEL: "info"

  nginx.conf: |
    server {
      listen 8080;
      location / {
        root /usr/share/nginx/html;
      }
      location /health {
        return 200 'OK';
      }
    }
immutable: true
---
apiVersion: v1
kind: Secret
metadata:
  name: webapp-secret-v1
type: Opaque
stringData:
  DB_PASSWORD: "prod-password"
  API_KEY: "prod-api-key"
immutable: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
spec:
  replicas: 3

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: webapp

  template:
    metadata:
      labels:
        app: webapp
      annotations:
        config-checksum: "v1"
        secret-checksum: "v1"
    spec:
      containers:
        - name: webapp
          image: nginx:alpine
          ports:
            - containerPort: 8080

          envFrom:
            - configMapRef:
                name: webapp-config-v1

          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: webapp-secret-v1
                  key: DB_PASSWORD

          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/
              readOnly: true

          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10

          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"

      volumes:
        - name: nginx-config
          configMap:
            name: webapp-config-v1
            items:
              - key: nginx.conf
                path: default.conf
