apiVersion: v1
kind: ConfigMap
metadata:
  name: webapp-config
data:
  APP_ENV: "production"
  APP_PORT: "8080"
  LOG_LEVEL: "warn"
  DB_HOST: "postgres-svc"
  DB_PORT: "5432"
  DB_NAME: "webapp"
  CACHE_HOST: "redis-svc"
  nginx.conf: |
    server {
      listen 8080;
      location / { root /usr/share/nginx/html; };
      location /health { return 200 'OK'; add_header Content-Type text/plain; }
    }
---
apiVersion: v1
kind: Secret
metadata:
  name: webapp-secret
type: Opaque
stringData:
  DB_PASSWORD: "prodpassword123"
  API_KEY: "sk-prod-abc123xyz"
  JWT_SECRET: "my-super-secret-jwt-key"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      containers:
        - name: webapp
          image: nginx:alpine
          ports:
            - containerPort: 80

          # non-sensitive from ConfigMap  
          envFrom:
            - configMapRef:
                name: webapp-config

          # sensitive from Secret
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: webapp-config
                  key: DB_PASSWORD

            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: webapp-secret
                  key: API_KEY

          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/
              readOnly: true

          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5

      volumes:
        - name: nginx-config
          configMap:
            name: webapp-config
            items:
              - key: nginx.conf
                path: default.conf
