apiVersion: apps/v1
kind: Deployment
metadata:
  name: genapp
  namespace: default
  labels:
    app: genapp
    version: "1.0"
  annotations:
    kubernetes.io/change-cause: "initial deployment of nginx:1.25"
spec:
  replicas: 3

  selector:
    matchLabels:
      app: genapp

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: genapp
        version: "1.0"
    spec:
      containers:
        - name: genapp
          image: nginx:1.25
          ports:
            - containerPort: 80

          env:
            - name: APP_ENV
              value: "production"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name

          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"

          startupProbe:
            httpGet:
              path: /
              port: 80
            failureThreshold: 15
            periodSeconds: 2

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 2

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
