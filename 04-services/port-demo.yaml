apiVersion: apps/v1
kind: Deployment
metadata:
  name: port-demo
spec:
  replicas: 3
  selector:
    matchLabels:
      app: port-demo
  template:
    metadata:
      labels:
        app: port-demo
    spec:
      containers:
        - name: app
          image: hashicorp/http-echo:alpine
          args:
            - "-text=hello from port demo pod"
          ports:
           - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: port-demo-svc
spec:
  type: NodePort
  selector:
    app: port-demo
  ports:
    - port: 80
      targetPort: 5678
      nodePort: 30090
