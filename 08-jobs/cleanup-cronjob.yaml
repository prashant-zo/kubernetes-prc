apiVersion: batch/v1
kind: CronJob
metadata:
  name: cleanup-old-files
spec:
  schedule: "0 0 * * 0"         
  timeZone: "Asia/Kolkata"
  concurrencyPolicy: Forbid

  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: cleanup
              image: busybox:1.35
              command:
                - 'sh'
                - '-c'
                - |
                  echo "Cleaning up files older than 7 days..."
                  find /data -type f -mtime +7 -delete
                  echo "Cleanup complete at $(date)"
              volumeMounts:
                - name: data-volume
                  mountPath: /data
              resources:
                requests:
                  memory: "32Mi"
                  cpu: "50m"
          volumes:
            - name: data-volume
              persistentVolumeClaim:
                claimName: app-data-pvc
